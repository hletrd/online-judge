# =============================================================================
# JudgeKit Production Deployment
#
# Usage:
#   docker compose -f docker-compose.production.yml --env-file .env.production up -d
#
# Prerequisites:
#   - Build images first (or use deploy.sh which handles everything)
#   - Create .env.production from .env.production.example
#   - Judge language images must be available (judge-cpp, judge-python, etc.)
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL Database
  # ---------------------------------------------------------------------------
  db:
    image: postgres:18-alpine
    container_name: judgekit-db
    restart: unless-stopped
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=512MB"
      - "-c"
      - "effective_cache_size=2GB"
      - "-c"
      - "work_mem=8MB"
      - "-c"
      - "maintenance_work_mem=128MB"
      - "-c"
      - "random_page_cost=2"
      - "-c"
      - "effective_io_concurrency=2"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "default_statistics_target=200"
    volumes:
      - judgekit-pgdata:/var/lib/postgresql
    environment:
      POSTGRES_DB: judgekit
      POSTGRES_USER: judgekit
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U judgekit"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Restricted Docker socket proxy — exposes image/build/container APIs.
  # Both the app container (standalone compiler + admin image management)
  # and the judge worker use this proxy instead of mounting the Docker socket
  # directly, reducing the blast radius of a container compromise.
  docker-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: judgekit-docker-proxy
    restart: unless-stopped
    environment:
      - CONTAINERS=1
      - IMAGES=1
      - BUILD=1
      - POST=1
      - DELETE=1
      - LOG_LEVEL=warning
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: judgekit-app:latest
    container_name: judgekit-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:3100:3000"
    volumes:
      - /compiler-workspaces:/compiler-workspaces   # Shared path for compiler sandbox volumes
    env_file:
      - .env.production
    environment:
      - DB_DIALECT=postgresql
      - DATABASE_URL=postgres://judgekit:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/judgekit
      - HOSTNAME=0.0.0.0
      - COMPILER_WORKSPACE_DIR=/compiler-workspaces
      - COMPILER_RUNNER_URL=http://judge-worker:3001
      - DOCKER_HOST=tcp://docker-proxy:2375
    depends_on:
      docker-proxy:
        condition: service_started
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "-O", "/dev/null", "http://127.0.0.1:3000/login"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  judge-worker:
    profiles: ["worker"]
    build:
      context: .
      dockerfile: Dockerfile.judge-worker
    image: judgekit-judge-worker:latest
    container_name: judgekit-judge-worker
    restart: unless-stopped
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    volumes:
      - /judge-workspaces:/judge-workspaces  # Identity-mapped so sibling containers see the same path
      - judgekit-dead-letter:/app/dead-letter
    env_file:
      - .env.production
    environment:
      - JUDGE_BASE_URL=http://app:3000/api/v1
      - JUDGE_SECCOMP_PROFILE=/etc/judge/seccomp-profile.json
      - DEAD_LETTER_DIR=/app/dead-letter
      - TMPDIR=/judge-workspaces
      - DOCKER_HOST=tcp://docker-proxy:2375
      - RUNNER_PORT=3001
      - RUNNER_HOST=0.0.0.0
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "-O", "/dev/null", "http://127.0.0.1:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      docker-proxy:
        condition: service_started
      app:
        condition: service_healthy

  code-similarity:
    build:
      context: .
      dockerfile: Dockerfile.code-similarity
    image: judgekit-code-similarity:latest
    container_name: judgekit-code-similarity
    restart: unless-stopped
    environment:
      - RUST_LOG=info
      - CODE_SIMILARITY_HOST=0.0.0.0
      - CODE_SIMILARITY_PORT=3002
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "-O", "/dev/null", "http://127.0.0.1:3002/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  judgekit-pgdata:
    driver: local
  judgekit-dead-letter:
    driver: local
