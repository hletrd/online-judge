# ========================================================================
# WARNING: HTTP-only configuration — for local development/testing ONLY.
# NEVER use this configuration in production. Use online-judge.nginx.conf
# with TLS termination instead.
# ========================================================================

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    return 444;
}

server {
    listen 80;
    listen [::]:80;
    server_name your-domain.example;

    client_max_body_size 50M;

    # Security headers (defense-in-depth alongside app-level headers)
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location = /api/v1/judge/poll {
        client_max_body_size 50M;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
