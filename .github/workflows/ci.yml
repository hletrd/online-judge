name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
  AUTH_URL: ${{ secrets.AUTH_URL || 'http://localhost:3110' }}
  JUDGE_AUTH_TOKEN: ${{ secrets.JUDGE_AUTH_TOKEN }}

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # Start a real PostgreSQL service so the integration suite
    # (tests/integration/**) runs against PG, not just skips. Without this
    # hasPostgresIntegrationSupport would be false and every describe.skipIf
    # would silently pass.
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: judgekit
          POSTGRES_PASSWORD: judgekit
          POSTGRES_DB: judgekit_test
          PGDATA: /var/lib/postgresql/data/pgdata
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U judgekit -d judgekit_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      INTEGRATION_DATABASE_URL: postgres://judgekit:judgekit@127.0.0.1:5432/judgekit_test

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: "**/package-lock.json"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Next.js build cache
        uses: actions/cache@v5
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json', '**/*.ts', '**/*.tsx', '**/*.js', '**/*.jsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-
            ${{ runner.os }}-nextjs-

      - name: Install dependencies
        run: npm ci

      - name: Audit Node.js dependencies
        run: npm audit --audit-level=high

      - name: Run lint
        run: npm run lint

      - name: Run TypeScript check
        run: npx tsc --noEmit

      - name: Run unit tests with coverage
        run: npm run test:unit:coverage

      - name: Run component tests
        run: npm run test:component

      - name: Run integration tests
        run: npm run test:integration

      - name: Run judge worker tests
        run: cargo test --quiet --manifest-path judge-worker-rs/Cargo.toml

      - name: Run code similarity tests
        run: cargo test --quiet --manifest-path code-similarity-rs/Cargo.toml

      - name: Run rate limiter tests
        run: cargo test --quiet --manifest-path rate-limiter-rs/Cargo.toml

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit Rust dependencies
        run: cargo audit

      - name: Run production build
        run: npm run build

      - name: Build JVM judge image
        run: docker build -t judge-jvm -f docker/Dockerfile.judge-jvm .

      - name: Smoke test JVM judge image
        run: |
          workspace="$(mktemp -d)"
          export WORKSPACE="$workspace"

          python3 - <<'PY'
          import os
          from pathlib import Path

          workspace = Path(os.environ["WORKSPACE"])
          workspace.joinpath("solution.java").write_text(
              """public class Main {
              public static void main(String[] args) throws Exception {
                  String input = new String(System.in.readAllBytes()).trim();
                  if (input.isEmpty()) return;
                  String[] parts = input.split("\\s+");
                  System.out.println(Integer.parseInt(parts[0]) + Integer.parseInt(parts[1]));
              }
          }
          """,
              encoding="utf-8",
          )
          workspace.joinpath("solution.kt").write_text(
              """fun main() {
                  val tokens = generateSequence(::readlnOrNull)
                      .flatMap { it.split(Regex("\\\\s+")).asSequence() }
                      .filter { it.isNotBlank() }
                      .toList()
                  if (tokens.size >= 2) {
                      println(tokens[0].toInt() + tokens[1].toInt())
                  }
          }
          """,
              encoding="utf-8",
          )
          PY

          java_output="$(docker run --rm -v "$workspace:/workspace" -w /workspace judge-jvm sh -lc "mkdir -p /workspace/out && cp /workspace/solution.java /workspace/Main.java && javac --release 25 -encoding UTF-8 -d /workspace/out /workspace/Main.java && printf '1 2\n' | java -cp /workspace/out Main")"
          [ "$java_output" = "3" ]

          kotlin_output="$(docker run --rm -v "$workspace:/workspace" -w /workspace judge-jvm sh -lc "kotlinc /workspace/solution.kt -include-runtime -d /workspace/solution.jar && printf '1 2\n' | java -jar /workspace/solution.jar")"
          [ "$kotlin_output" = "3" ]

  docker-validate:
    name: Docker image validation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate docker-compose.yml syntax
        run: docker compose config --quiet

      - name: Check Dockerfile syntax (judge-cpp)
        run: docker build --check -f docker/Dockerfile.judge-cpp .

      - name: Check Dockerfile syntax (judge-python)
        run: docker build --check -f docker/Dockerfile.judge-python .

      - name: Check Dockerfile syntax (judge-node)
        run: docker build --check -f docker/Dockerfile.judge-node .

      - name: Check Dockerfile syntax (judge-jvm)
        run: docker build --check -f docker/Dockerfile.judge-jvm .

      - name: Check Dockerfile syntax (judge-rust)
        run: docker build --check -f docker/Dockerfile.judge-rust .

      - name: Check Dockerfile syntax (judge-go)
        run: docker build --check -f docker/Dockerfile.judge-go .

      - name: Check Dockerfile syntax (judge-swift)
        run: docker build --check -f docker/Dockerfile.judge-swift .

      - name: Check Dockerfile syntax (judge-csharp)
        run: docker build --check -f docker/Dockerfile.judge-csharp .

      - name: Check Dockerfile syntax (judge-r)
        run: docker build --check -f docker/Dockerfile.judge-r .

      - name: Check Dockerfile syntax (judge-perl)
        run: docker build --check -f docker/Dockerfile.judge-perl .

      - name: Check Dockerfile syntax (judge-php)
        run: docker build --check -f docker/Dockerfile.judge-php .

  scripts:
    name: Script validation
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Syntax check backup-db.sh
        run: bash -n scripts/backup-db.sh

      - name: Syntax check verify-db-backup.sh
        run: bash -n scripts/verify-db-backup.sh

      - name: Syntax check pg-volume-safety-check.sh
        run: bash -n scripts/pg-volume-safety-check.sh

      - name: Syntax check deploy scripts
        run: |
          bash -n deploy-docker.sh
          bash -n deploy.sh
          bash -n deploy-test-backends.sh

      - name: Smoke test backup script
        run: bash scripts/test-backup.sh

      - name: Assert PGDATA is pinned in every postgres compose service
        # The postgres:18-alpine image defaults PGDATA to a non-standard path.
        # If a compose file mounts judgekit-pgdata without pinning PGDATA,
        # the cluster silently lands in an anonymous volume and the named
        # volume stays empty — the exact failure mode of the Apr 2026 data
        # wipe. This step fails CI if any postgres service regresses that
        # pinning.
        run: python3 scripts/check-pgdata-pinned.py docker-compose.production.yml docker-compose.test-backends.yml

  e2e:
    name: End-to-end tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: quality

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: "**/package-lock.json"

      - name: Restore Next.js build cache
        uses: actions/cache@v5
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json', '**/*.ts', '**/*.tsx', '**/*.js', '**/*.jsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-
            ${{ runner.os }}-nextjs-

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Reset SQLite database
        run: |
          mkdir -p data
          rm -f data/judge.db data/judge.db-shm data/judge.db-wal

      - name: Apply database schema
        run: npm run db:push

      - name: Seed database
        run: npm run seed

      - name: Synchronize language configs
        run: npm run languages:sync

      - name: Verify backup and restore scripts
        run: |
          npm run backup:db -- "$RUNNER_TEMP/judgekit-backup.db"
          npm run backup:verify -- "$RUNNER_TEMP/judgekit-backup.db" "$RUNNER_TEMP/judgekit-restore.db"

      - name: Build app for Playwright webServer
        run: npm run build

      - name: Run Playwright test suite
        run: npx playwright test

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-artifacts
          path: |
            .sisyphus/evidence/playwright/html-report
            .sisyphus/evidence/playwright/artifacts
          if-no-files-found: ignore
          retention-days: 14
